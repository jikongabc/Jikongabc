name: Generate Snake

on:
  # 每 12 小时自动更新一次
  schedule:
    - cron: "0 */12 * * *"
  # 允许在 Actions 页面手动触发
  workflow_dispatch:
  # 每次 push 到 main 也重新生成
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # 生成两份:浅色(默认配色)和深色(紫色渐变炫酷款)
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=#a855f7&color_dots=#1b1f23,#4b2d91,#7c3aed,#a855f7,#e9d5ff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
